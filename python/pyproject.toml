# SPDX-License-Identifier: BSD-3-Clause
#
# SCAFFOLD — reserves the package name + layout. The reference verifier is being
# extracted into agent_action_capsule/ from the reference engine; do not publish
# this to PyPI until verify.py + the conformance suite (../test-vectors) land.

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "agent-action-capsule"
version = "0.0.0"
description = "Reference parse + verify library for the Agent Action Capsule SCITT profile (draft-mih-scitt-agent-action-capsule)."
readme = "README.md"
requires-python = ">=3.9"
license = { text = "BSD-3-Clause" }
authors = [{ name = "Action State Group" }]
keywords = ["scitt", "cose", "agent", "capsule", "verification", "transparency"]
classifiers = [
    "License :: OSI Approved :: BSD License",
    "Programming Language :: Python :: 3",
    "Topic :: Security :: Cryptography",
    "Development Status :: 1 - Planning",
]
# Runtime deps intentionally minimal; the envelope is verified by the SCITT/COSE
# substrate (scitt-cose), not re-implemented here.
dependencies = []

[project.urls]
Homepage = "https://github.com/action-state-group/agent-action-capsule"
Source = "https://github.com/action-state-group/agent-action-capsule"
Draft = "https://datatracker.ietf.org/doc/draft-mih-scitt-agent-action-capsule/"

[project.optional-dependencies]
dev = ["pytest>=7.0", "ruff>=0.4"]

[tool.setuptools]
packages = ["agent_action_capsule"]
